# Nginx reverse proxy: port 80 -> Node server on 127.0.0.1:8787, with the
# WebSocket upgrade headers the /ws endpoint needs. Install to
# /etc/nginx/conf.d/maw.conf, then: sudo systemctl enable --now nginx
#
# For HTTPS (wss://), point server_name at your domain and run:
#   sudo dnf install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your.domain.com
# The client automatically uses wss:// when the page is served over https://.
server {
  listen 80;
  server_name _;

  location / {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}
