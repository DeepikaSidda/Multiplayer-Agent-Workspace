# Auto-deploy to the EC2 instance on every push to main.
#
# One-time setup — add these GitHub repo secrets (Settings → Secrets → Actions):
#   EC2_HOST         public IP/DNS of the instance (e.g. 13.220.41.228)
#   EC2_USER         ssh user (Amazon Linux: ec2-user)
#   EC2_SSH_KEY_B64  the private key, base64-encoded to a SINGLE line
#                    (Windows PowerShell, copies it to your clipboard):
#                      [Convert]::ToBase64String([IO.File]::ReadAllBytes("$env:USERPROFILE\maw-key-lf.pem")) | Set-Clipboard
#   AWS_REGION       e.g. us-east-1  (enables the Bedrock agent)
#
# Using a base64 single-line secret avoids the multiline / CRLF problems that
# break SSH key parsing when a PEM is pasted directly.

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Strip any whitespace/newlines the secret may have picked up when
          # pasted, then decode. Guards against "error in libcrypto".
          printf '%s' "$EC2_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > key.pem
          chmod 600 key.pem
          # Fail early with a clear message if the key didn't decode to a valid key.
          ssh-keygen -y -f key.pem > /dev/null || { echo "::error::EC2_SSH_KEY_B64 did not decode to a valid private key. Re-copy it with: [Convert]::ToBase64String([IO.File]::ReadAllBytes(\"\$env:USERPROFILE\\maw-key-lf.pem\")) | Set-Clipboard"; exit 1; }

          ssh -i key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 \
            "$EC2_USER@$EC2_HOST" \
            "AWS_REGION='$AWS_REGION' REPO='$REPO' bash -s" <<'REMOTE'
          set -euxo pipefail
          # Ensure prerequisites exist on the host (fresh instances may lack git).
          command -v git >/dev/null 2>&1 || sudo dnf install -y git
          command -v docker >/dev/null 2>&1 || { sudo dnf install -y docker && sudo systemctl enable --now docker; }
          REPO_DIR=/opt/maw
          if [ ! -d "$REPO_DIR/.git" ]; then
            sudo rm -rf "$REPO_DIR"
            sudo git clone "https://github.com/$REPO.git" "$REPO_DIR"
            sudo chown -R "$(whoami)" "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          git fetch --all
          git reset --hard origin/main
          sudo docker build -t maw:latest .
          sudo docker rm -f maw 2>/dev/null || true
          mkdir -p /opt/maw-data
          sudo docker run -d --name maw --restart always -p 80:8787 \
            -e AWS_REGION="$AWS_REGION" \
            -e BEDROCK_REGION="$AWS_REGION" \
            -v /opt/maw-data:/data \
            maw:latest
          sleep 3
          curl -fsS http://localhost/health
          REMOTE
